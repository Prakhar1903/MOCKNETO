# ─────────────────────────────────────────────────────────────────────────────
#  Nginx Reverse Proxy Config — Mockneto (EC2)
#  Place this file at: /etc/nginx/sites-available/default on your EC2 instance
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;          # Matches any hostname / IP

    # ── Proxy all traffic to the Node.js Docker container ─────────────────
    location / {
        proxy_pass         http://localhost:5600;
        proxy_http_version 1.1;

        # Required for WebSocket / long-polling support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';

        # Pass real client info to the app
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Increase timeout for AI responses (Gemini can be slow)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check endpoint (used by ALB / monitoring) ──────────────────
    location /api/health {
        proxy_pass http://localhost:5600/api/health;
        access_log off;
    }
}
